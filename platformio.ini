; MeltyFC Firmware — PlatformIO Configuration
; https://github.com/MeltyFC/firmware
;
; Hybrid framework: STM32duino (Arduino) app layer + HAL/LL for timer+DMA subsystems
; See spec §2 for architecture rationale.

[platformio]
default_envs = crux_f405hd

; =============================================================================
; TARGET: Happymodel CruxF405HD ELRS AIO
; =============================================================================
[env:crux_f405hd]
platform = ststm32
board = genericSTM32F405RG
framework = stm32cube
platform_packages =
    toolchain-gccarmnoneeabi@~1.120301.0
build_flags =
    -D TARGET_CRUX_F405HD
    -D HSE_VALUE=8000000U
    -D USBCON
    -D USB_VID=0x0483
    -D USB_PID=0x5740
    -D HAL_PCD_MODULE_ENABLED
    -I targets/crux_f405hd
    -I include
    -Wall
    -Wextra
    -Wno-unused-parameter
    -Os
build_unflags = -Werror
build_src_filter =
    +<*>
    +<../targets/crux_f405hd/>
    -<../test/>
lib_deps =
    adafruit/Adafruit LIS331@^1.0.0
    ; CRSF lib — validate on STM32duino, else implement from spec
    ; AlfredoCRSF or CRSFforArduino — pinned after validation
    ; ICM-42688 — finani/ICM42688 or register-level
upload_protocol = dfu
monitor_speed = 115200

; =============================================================================
; NATIVE: Unit tests (runs on host, no hardware)
; =============================================================================
[env:native]
platform = native
build_flags =
    -D UNIT_TEST
    -D NATIVE_BUILD
    -I include
    -I src
    -std=c++17
    -Wall
    -Wextra
    -Werror
    -Wno-unused-parameter
    -fsanitize=address,undefined
    -fno-omit-frame-pointer
build_unflags = -Os
test_build_src = yes
build_src_filter =
    +<*>
    -<main.cpp>
    -<sensors_h3lis.cpp>
    -<sensors_icm.cpp>
lib_deps =
    throwtheswitch/Unity@^2.5.2
test_framework = unity
