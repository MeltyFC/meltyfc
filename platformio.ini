; MeltyFC Firmware — PlatformIO Configuration
; https://github.com/MeltyFC/firmware
;
; Multi-target build: F4 (CruxF405HD), F7 (Aikon F7 Mini, JHEMCU GHF745),
; H7 (MicoAir H743 V2 — T2, not yet implemented).
;
; Architecture: pure-logic core + per-family HAL + per-board target.
; See docs/MULTI_TARGET_SPEC.md and docs/PORTING.md.

[platformio]
default_envs = crux_f405hd

; =============================================================================
; SHARED: Common settings for all STM32 targets
; =============================================================================
[common_stm32]
platform = ststm32
framework = stm32cube
platform_packages =
    toolchain-gccarmnoneeabi@~1.120301.0
build_flags =
    -D HSE_VALUE=8000000U
    -D USBCON
    -D USB_VID=0x0483
    -D USB_PID=0x5740
    -D HAL_PCD_MODULE_ENABLED
    -I include
    -I src
    -Wall
    -Wextra
    -Wno-unused-parameter
    -Os
build_unflags = -Werror
lib_deps =
    adafruit/Adafruit LIS331@^1.0.0
    ; CRSF lib — validate on STM32duino, else implement from spec
    ; ICM-42688 — finani/ICM42688 or register-level
upload_protocol = dfu
monitor_speed = 115200

; =============================================================================
; TARGET: Happymodel CruxF405HD ELRS AIO (STM32F405, F4 family)
; =============================================================================
[env:crux_f405hd]
extends = common_stm32
board = genericSTM32F405RG
build_flags =
    ${common_stm32.build_flags}
    -D TARGET_CRUX_F405HD
    -I targets/crux_f405hd
build_src_filter =
    +<*>
    +<../targets/crux_f405hd/>
    +<hal/common/>
    +<hal/f4/>
    -<hal/f7/>
    -<hal/h7/>
    -<../test/>

; =============================================================================
; TARGET: Aikon F7 Mini 45A AM32 AIO (STM32F722, F7 family)
; =============================================================================
[env:aikon_f7mini]
extends = common_stm32
board = nucleo_f722ze
board_build.mcu = stm32f722ret6
build_flags =
    ${common_stm32.build_flags}
    -D TARGET_AIKON_F7MINI
    -D STM32F7xx
    -D STM32F722xx
    -I targets/aikon_f7mini
build_src_filter =
    +<*>
    +<../targets/aikon_f7mini/>
    +<hal/common/>
    +<hal/f7/>
    -<hal/f4/>
    -<hal/h7/>
    -<../test/>

; =============================================================================
; TARGET: JHEMCU GHF745 AIO (STM32F745, F7 family)
; =============================================================================
[env:jhemcu_ghf745]
extends = common_stm32
board = nucleo_f746zg
board_build.mcu = stm32f745vgt6
build_flags =
    ${common_stm32.build_flags}
    -D TARGET_JHEMCU_GHF745
    -D STM32F7xx
    -D STM32F745xx
    -I targets/jhemcu_ghf745
build_src_filter =
    +<*>
    +<../targets/jhemcu_ghf745/>
    +<hal/common/>
    +<hal/f7/>
    -<hal/f4/>
    -<hal/h7/>
    -<../test/>

; =============================================================================
; TARGET: MicoAir H743 V2 AIO 45A (STM32H743, H7 family) — T2, NOT YET READY
; Uncomment after T2 HAL port is complete.
; =============================================================================
; [env:micoair_h743v2]
; extends = common_stm32
; board = genericSTM32H743VI
; build_flags =
;     ${common_stm32.build_flags}
;     -D TARGET_MICOAIR_H743V2
;     -I targets/micoair_h743v2
; build_src_filter =
;     +<*>
;     +<../targets/micoair_h743v2/>
;     +<hal/common/>
;     +<hal/h7/>
;     -<hal/f4/>
;     -<hal/f7/>
;     -<../test/>

; =============================================================================
; NATIVE: Unit tests (runs on host, no hardware)
; =============================================================================
[env:native]
platform = native
build_flags =
    -D UNIT_TEST
    -D NATIVE_BUILD
    -I include
    -I src
    -std=c++17
    -Wall
    -Wextra
    -Werror
    -Wno-unused-parameter
    -fsanitize=address,undefined
    -fno-omit-frame-pointer
build_unflags = -Os
test_build_src = yes
build_src_filter =
    +<*>
    -<main.cpp>
    -<sensors_h3lis.cpp>
    -<sensors_icm.cpp>
    -<hal/>
lib_deps =
    throwtheswitch/Unity@^2.5.2
test_framework = unity
